---
# tasks file for roles/database
- name: Run database container
  docker_container:
    name: database
    image: stepahnedaniel/mydatabase:latest
    networks:
      - name: appnetwork
    env:
      POSTGRES_DB: db
      POSTGRES_USER: usr
      POSTGRES_PASSWORD: pwd
    volumes:
      - db-data:/var/lib/postgresql/data
  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python