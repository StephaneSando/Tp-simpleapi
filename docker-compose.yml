services:
  backend:
    build: .
    networks:
      - appnetwork
      - httpnetwork
    depends_on:
      - database
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/db
      - SPRING_DATASOURCE_USERNAME=usr
      - SPRING_DATASOURCE_PASSWORD=pwd
    

  database:
    build: ./database
    networks:
      - appnetwork
    environment:
      - POSTGRES_DB=db
      - POSTGRES_USER=usr
      - POSTGRES_PASSWORD=pwd
    volumes:
      - db-data:/var/lib/postgresql/data
    

  httpd:
    build: ./httpd
    ports:
      - "80:80"
    networks:
      - httpnetwork
    depends_on:
      - backend
    

networks:
  httpnetwork:
  appnetwork:

volumes:
  db-data: