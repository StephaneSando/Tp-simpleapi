name: CI devops 2025

on:
  push:
    branches:
      - '**'        
      - '!main'     
  pull_request:
    branches:
      - main        

jobs:

  # Job 1 Tests  
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and Test with Maven
        run: mvn -B verify --file ./pom.xml

  # Job 2: Analyse Sonar
  analyse-sonar:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: SonarCloud Analysis
        run: mvn -B verify sonar:sonar 
         -Dsonar.projectKey=stedaniel_simple-api 
         -Dsonar.organization=stedaniel 
         -Dsonar.host.url=https://sonarcloud.io 
         -Dsonar.login=${{ secrets.SONAR_TOKEN }} 
         --file ./pom.xml

  # Job 3 Build et push backend 
  build-and-push-backend:
    needs: analyse-sonar
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mybackend:latest
          push: ${{ github.ref == 'refs/heads/main' }}

  # Job 4 Build et push database 
  build-and-push-database:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mydatabase:latest
          push: ${{ github.ref == 'refs/heads/main' }}

  # Job 5 Build et push httpd 
  build-and-push-httpd:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./httpd
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/myhttpd:latest
          push: ${{ github.ref == 'refs/heads/main' }}
          
  # Job 6: deploy Ansible
  deploy:
    needs:
      - build-and-push-backend
      - build-and-push-database
      - build-and-push-httpd
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa
          ssh-keyscan -H stephane.sando-feuwo.takima.school >> ~/.ssh/known_hosts

      - name: Run Ansible playbook
        run: ansible-playbook -i ansible/inventories/setup.yml ansible/playbook.yml